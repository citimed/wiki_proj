name: Auto-Generate MD Docs and Sync

on:
  push:
    branches:
      - main
    paths:
      - 'MAIN_DB/StoredProcedure/**.sql'
      - 'MAIN_DB.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# 🔥 ДОБАВЛЯЕМ ЭТИ ДВЕ СТРОКИ:
permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    # ... дальше всё без изменений ...

    steps:
    # 1. Забираем файлы репозитория на сервер GitHub
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # 2. Поднимаем встроенный Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Устанавливаем библиотеки для работы с Google Drive API
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

    # 4. Создаем временный файл авторизации из секретов GitHub
    - name: Create Credentials File
      run: |
        echo '${{ secrets.GOOGLE_CREDENTIALS }}' > github_credentials.json

    # 5. Запускаем парсер и синхронизатор
    - name: Run Parser and Sync Script
      env:
        GOOGLE_FOLDER_ID: ${{ secrets.GOOGLE_FOLDER_ID }}
      run: |
        python .github/scripts/parse_and_sync.py

    # 6. Удаляем файл ключа, чтобы он случайно не попал в коммит
    - name: Clean credentials
      run: rm -f github_credentials.json

    # 7. Пушим созданные/обновленные .md файлы обратно в твой Git
    - name: Commit and Push generated Markdown files
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "docs: автоматическая генерация схем и описаний [skip ci]"
        file_pattern: '**.md'
