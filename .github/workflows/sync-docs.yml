name: Sync DB and Modules Documentation to Google Drive

on:
  push:
    branches:
      - main
    paths:
      - 'DB/**'
      - '*.md'
      - '**/*.md'
      - '!.github/**'
      - '!wiki/**'

permissions:
  contents: write

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v44
      with:
        json: true
        escape_json: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

    - name: Create Service Account Key File
      run: |
        cat << 'EOF' > github_credentials.json
        ${{ secrets.GOOGLE_CREDENTIALS }}
        EOF
        
        if ! grep -q "{" github_credentials.json; then
          echo "🔄 Декодируем Base64..."
          base64 --decode github_credentials.json > temp.json && mv temp.json github_credentials.json
        fi

    - name: Run Parse and Sync Script
      env:
        GOOGLE_FOLDER_ID: ${{ secrets.GOOGLE_FOLDER_ID }}
        CHANGED_FILES_JSON: ${{ steps.changed-files.outputs.all_changed_files }}
      run: |
        python .github/scripts/parse_and_sync.py

    - name: Commit and Push changes to Wiki
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        echo "=== ➕ Добавление файлов ==="
        git add -f wiki/
        
        echo "=== 🚀 Пуш ==="
        if git diff --cached --quiet; then
          echo "💡 Новых изменений в папке wiki не найдено."
        else
          git commit -m "docs: автогенерация локальной wiki структуры [skip ci]"
          git push origin main
          echo "✅ Все файлы успешно отправлены в репозиторий!"
        fi
