name: Sync DB and Modules Documentation to Google Drive

on:
  push:
    branches:
      - main
    paths:
      - 'DB/**'
      - '*.md'
      - '**/*.md'
      - '!.github/**'
      - '!wiki/**'

permissions:
  contents: write
  pull-requests: write
  repository-projects: write
  statuses: write

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v44
      with:
        json: true
        escape_json: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: ''

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

    - name: Create Service Account Key File
      run: |
        # Запись многострочного секрета через HEREDOC
        cat << 'EOF' > github_credentials.json
        ${{ secrets.GOOGLE_CREDENTIALS }}
        EOF
        
        # Автодекодирование, если в секретах GitHub лежит Base64 вместо чистого JSON
        if ! grep -q "{" github_credentials.json; then
          echo "🔄 Обнаружена Base64-строка. Декодируем..."
          base64 --decode github_credentials.json > temp.json && mv temp.json github_credentials.json
        fi
        
        echo "✅ Файл ключа создан. Размер: $(wc -c < github_credentials.json) байт."

    - name: Run Parse and Sync Script
      env:
        GOOGLE_FOLDER_ID: ${{ secrets.GOOGLE_FOLDER_ID }}
        CHANGED_FILES_JSON: ${{ steps.changed-files.outputs.all_changed_files }}
      run: |
        python .github/scripts/parse_and_sync.py

    - name: Commit and Push changes to Wiki
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        echo "=== 🧹 Очищаем индекс и добавляем заново ==="
        # Это заставит Git принудительно переиндексировать всю папку wiki
        git rm -r --cached wiki/ 2>/dev/null || true
        git add wiki/
        
        echo "=== 📊 Проверяем, что попало в индекс ==="
        git status
        
        echo "=== 🚀 Пушим изменения ==="
        if ! git diff --cached --quiet; then
          git commit -m "docs: автогенерация локальной wiki структуры [skip ci]"
          git push origin main
          echo "✅ Изменения успешно отправлены в репозиторий!"
        else
          echo "💡 Git не зафиксировал новых изменений в папке wiki."
        fi
