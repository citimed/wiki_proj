name: Sync Documentation to Wiki and Google Drive

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'wiki/**' # Игнорируем изменения в самой вики, чтобы избежать циклов

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Важно для корректного определения измененных файлов

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v44
      with:
        json: true
        escape_json: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-refresh-token-identity google-api-python-client google-auth-httplib2 google-auth-oauthlib

    - name: Decode Google Credentials
      run: |
        echo "${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}" | base64 -d > github_credentials.json

    - name: Run Parse and Sync Script
      env:
        GOOGLE_FOLDER_ID: ${{ secrets.GOOGLE_FOLDER_ID }}
        # Передаем список измененных файлов в формате JSON в переменные окружения
        CHANGED_FILES_JSON: ${{ steps.changed-files.outputs.all_changed_files }}
      run: |
        python .github/scripts/parse_and_sync.py

    - name: Commit and Push Changes to Wiki
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add wiki/
        # Проверяем, есть ли что коммитить, чтобы экшен не падал при пустом diff
        git diff-index --quiet HEAD || git commit -m "chore: auto-sync wiki documentation [skip ci]"
        git push
