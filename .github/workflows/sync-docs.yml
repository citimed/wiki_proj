name: Auto-Generate MD Docs and Sync

on:
  push:
    branches:
      - main
    paths:
      - 'MAIN_DB/StoredProcedure/**.sql'
      - 'wiki/MAIN_DB/MAIN_DB.md' # 🔥 Теперь путь соответствует твоему шаблону

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

    - name: Create Credentials File
      run: |
        echo '${{ secrets.GOOGLE_CREDENTIALS }}' > github_credentials.json

    - name: Run Parser and Sync Script
      env:
        GOOGLE_FOLDER_ID: ${{ secrets.GOOGLE_FOLDER_ID }}
      run: |
        python .github/scripts/parse_and_sync.py

    - name: Clean credentials
      run: rm -f github_credentials.json

    - name: Commit and Push generated Markdown files
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "docs: генерация документации в корневой каталог wiki [skip ci]"
        file_pattern: '**.md'
